          type: string
          key: monitor_noroute
        - name: MonitorKillStates
          type: string
          key: monitor_killstates
        - name: MonitorKillStatesPriority
          type: string
          key: monitor_killstates_priority
        - name: Monitor
          type: string
          key: monitor
        - name: ForceDown
          type: string
          key: force_down
        - name: LatencyLow
          type: api.IntLike
          key: latencylow
        - name: CurrentLatencyLow
          type: api.IntLike
          key: current_latencylow
        - name: LatencyHigh
          type: api.IntLike
          key: latencyhigh
        - name: CurrentLatencyHigh
          type: api.IntLike
          key: current_latencyhigh

        - name: LossLow
          type: api.IntLike
          key: losslow
        - name: CurrentLossLow
          type: api.IntLike
          key: current_losslow
        - name: LossHigh
          type: api.IntLike
          key: losshigh
        - name: CurrentLossHigh
          type: api.IntLike
          key: current_losshigh

        - name: Interval
          type: api.IntLike
          key: interval
        - name: CurrentInterval
          type: api.IntLike
          key: current_interval
        - name: TimePeriod
          type: api.IntLike
          key: time_period
        - name: CurrentTimePeriod
          type: api.IntLike
          key: current_time_period
        - name: LossInterval
          type: api.IntLike
          key: loss_interval
        - name: CurrentLossInterval
          type: api.IntLike
          key: current_loss_interval
        - name: DataLength
          type: api.IntLike
          key: data_length
        - name: CurrentDataLength
          type: api.IntLike
          key: current_data_length

      GatewayRequest:
        - name: Disabled
          type: string
          key: disabled
        - name: Name
          type: string
          key: name
        - name: Interface
          type: string
          key: interface
        - name: IPProtocol
          type: string
          key: ipprotocol
        - name: Priority
          type: string
          key: priority
        - name: Gateway
          type: string
          key: gateway
        - name: DefaultGW
          type: string
          key: defaultgw
        - name: FarGW
          type: string
          key: fargw
        - name: MonitorDisable
          type: string
          key: monitor_disable
        - name: MonitorNoRoute
          type: string
          key: monitor_noroute
        - name: MonitorKillStates
          type: string
          key: monitor_killstates
        - name: MonitorKillStatesPriority
          type: string
          key: monitor_killstates_priority
        - name: Monitor
          type: string
          key: monitor
        - name: ForceDown
          type: string
          key: force_down
        - name: Weight
          type: string
          key: weight
        - name: LatencyLow
          type: string
          key: latencylow
        - name: LatencyHigh
          type: string
          key: latencyhigh
        - name: LossLow
          type: string
          key: losslow
        - name: LossHigh
          type: string
          key: losshigh
        - name: Interval
          type: string
          key: interval
        - name: TimePeriod
          type: string
          key: time_period
        - name: LossInterval
          type: string
          key: loss_interval
        - name: DataLength
          type: string
          key: data_length
        - name: Description
          type: string
          key: descr

      SearchResponse:
        - name: Total
          type: int
          key: total
        - name: RowCount
          type: int
          key: rowCount
        - name: Current
          type: int
          key: current
        - name: Rows
          type: "[]Item"
          key: rows
    rpc_calls:
      - name: "AddGateway"
        method: "POST"
        endpoint: "/routing/settings/add_gateway"
        result_type: "api.ActionResult"
        params:
          - name: "gateway_item"
            optional: false
            type: "GatewayRequest"
            bodyParameter: true
      - name: "SetGateway"
        method: "POST"
        endpoint: "/routing/settings/set_gateway"
        result_type: "api.ActionResult"
        params:
          - name: "gateway_item"
            optional: false
            type: "GatewayRequest"
            bodyParameter: true
          - name: "uuid"
            optional: false
      - name: "SearchGateways"
        method: "POST"
        endpoint: "/routing/settings/search_gateway"
        result_type: "SearchResponse"
      - name: "GetGateway"
        method: "POST"
        endpoint: "/routing/settings/get_gateway"
        result_type: "GetGatewayResponse"
        params:
          - name: "uuid"
            optional: false
      - name: "DeleteGateway"
        method: "POST"
        endpoint: "/routing/settings/del_gateway"
        result_type: "api.ActionResult"
        params:
          - name: "uuid"
            optional: false
      - name: "ApplyGateways"
        method: "POST"
        endpoint: "/routing/settings/reconfigure"
        result_type: "api.ActionResult"
