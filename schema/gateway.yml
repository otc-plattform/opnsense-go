          type: string
          key: interface
        - name: Weight
          type: api.IntLike
          key: weight
        - name: IPProtocol
          type: string
          key: ipprotocol
        - name: Name
          type: string
          key: name
        - name: Description
          type: string
          key: descr
        - name: MonitorDisable
          type: api.BoolLike # booleans can arrive as true/false OR "1"/"0" -> keep BoolLike for known ambiguous fields
