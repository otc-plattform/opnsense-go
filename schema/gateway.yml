        - name: GatewayInterface
          type: bool
          key: gateway_interface
        - name: Iface
          type: string
          key: if
        - name: Dynamic
          type: bool
          key: dynamic
        - name: Virtual
          type: bool
          key: virtual
        - name: Priority
          type: api.IntLike # numeric-ish values can be int or string
          key: priority
        - name: Attribute
          type: api.IntLike
          key: attribute
        - name: Gateway
          type: string
          key: gateway
        - name: UUID
          type: string
          key: uuid
        - name: Disabled
          type: bool
          key: disabled
        - name: Upstream
          type: bool
          key: upstream
        - name: DefaultGW
          type: bool
          key: defaultgw
        - name: InterfaceDescr
          type: string
          key: interface_descr
        - name: Status
          type: string
          key: status
        - name: Delay
          type: string
          key: delay
        - name: StdDev
          type: string
          key: stddev
        - name: Loss
          type: string
          key: loss
